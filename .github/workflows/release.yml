name: Build & Release

on:
  push:
    branches: [main]
    tags: [v*]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Build & Publish (macOS)
        if: matrix.os == 'macos-latest'
        run: npx electron-builder --mac ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          CSC_LINK: ""
          CSC_KEY_PASSWORD: ""

      - name: Build & Publish (Windows)
        if: matrix.os == 'windows-latest'
        run: npx electron-builder --win ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & Publish (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: npx electron-builder --linux ${{ startsWith(github.ref, 'refs/tags/v') && '--publish always' || '--publish never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
